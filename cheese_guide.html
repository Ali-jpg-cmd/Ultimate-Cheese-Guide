<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Every Type of Cheese Explained</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF8EE;
    --gold: #C8922A;
    --dark: #1A0800;
    --muted: #7A6450;
    --white: #FFFDF7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0D0500;
    color: var(--dark);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ─── SLIDES ─────────────────────────────────────────────── */
  .slideshow { width: 100%; height: 100vh; position: relative; }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  .slide.active { opacity: 1; pointer-events: all; }

  /* ─── COVER ──────────────────────────────────────────────── */
  .cover {
    background: radial-gradient(ellipse at 30% 60%, #2A1200 0%, #0D0500 60%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .cover::before {
    content: '';
    position: absolute;
    inset: 20px;
    border: 2px solid #C8922A40;
    pointer-events: none;
  }
  .cover-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
  }
  .cover-emojis {
    position: absolute;
    bottom: 40px;
    display: flex;
    gap: 24px;
    font-size: 36px;
    opacity: 0.5;
  }
  .cover h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(48px, 8vw, 90px);
    color: var(--white);
    line-height: 1;
    text-align: center;
  }
  .cover h1 span { color: #C8922A; }
  .cover p {
    margin-top: 20px;
    color: #C8A870;
    font-size: 16px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
  }
  .cover-count {
    margin-top: 40px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .cover-pill {
    padding: 6px 18px;
    border: 1px solid #C8922A60;
    border-radius: 20px;
    color: #C8A870;
    font-size: 13px;
  }
  .start-btn {
    margin-top: 48px;
    padding: 14px 40px;
    background: #C8922A;
    color: #1A0800;
    border: none;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .start-btn:hover { background: #E8A030; transform: translateY(-1px); }

  /* ─── CHEESE SLIDE ───────────────────────────────────────── */
  .cheese-slide {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  .left-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    position: relative;
    overflow: hidden;
  }
  .left-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 30px,
      rgba(255,255,255,0.03) 30px,
      rgba(255,255,255,0.03) 31px
    );
  }

  .cheese-num {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 44px;
    height: 44px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
  }

  .cheese-svg-wrap {
    width: 160px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 8px 32px rgba(0,0,0,0.3));
    margin-bottom: 20px;
  }

  .cheese-name {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 900;
    color: #1A0800;
    text-align: center;
    line-height: 1;
  }
  .cheese-origin {
    margin-top: 10px;
    padding: 5px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    color: white;
    letter-spacing: 0.5px;
  }
  .cheese-type-label {
    margin-top: 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #1A080099;
  }
  .flavor-tag {
    margin-top: 8px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    color: #1A080088;
    text-align: center;
  }

  /* ─── RIGHT PANEL ────────────────────────────────────────── */
  .right-panel {
    background: var(--white);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 36px 40px;
    gap: 0;
    scrollbar-width: thin;
    scrollbar-color: #E8D0A0 transparent;
  }

  .section-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid #E8D0A0;
  }

  .badges {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .badge {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .badge span:first-child { font-size: 9px; font-weight: 700; letter-spacing: 2px; opacity: 0.6; text-transform: uppercase; }

  .about-text {
    font-size: 14px;
    line-height: 1.7;
    color: #3A2010;
    margin-bottom: 24px;
  }

  .facts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
  }
  .fact-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    color: #3A2010;
    line-height: 1.4;
  }
  .fact-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .pairings-wrap {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .pairing-chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid;
  }

  /* ─── RECIPE / HOW TO MAKE ───────────────────────────────── */
  .recipe-section {
    background: #1A0800;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .recipe-section .section-label { color: #C8922A; border-color: #C8922A40; }
  .recipe-steps {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .recipe-step {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .step-num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #C8922A;
    color: #1A0800;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .step-text {
    font-size: 12.5px;
    line-height: 1.5;
    color: #E8D0A0;
  }
  .step-text strong { color: #C8922A; }

  .fun-fact-bar {
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 12.5px;
    line-height: 1.5;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .fun-fact-bar .star { font-size: 16px; flex-shrink: 0; }

  /* ─── NAVIGATION ─────────────────────────────────────────── */
  .nav {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(26,8,0,0.92);
    backdrop-filter: blur(12px);
    padding: 10px 20px;
    border-radius: 40px;
    border: 1px solid #C8922A40;
    z-index: 100;
  }
  .nav-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid #C8922A60;
    background: transparent;
    color: #C8922A;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .nav-btn:hover { background: #C8922A20; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-info { color: #C8A870; font-size: 13px; font-weight: 500; min-width: 80px; text-align: center; }
  .nav-dots {
    display: flex;
    gap: 4px;
  }
  .nav-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #C8922A30;
    cursor: pointer;
    transition: background 0.2s, width 0.2s;
  }
  .nav-dot.active { background: #C8922A; width: 18px; border-radius: 3px; }

  /* ─── SUMMARY SLIDE ──────────────────────────────────────── */
  .summary-slide {
    background: #0D0500;
    padding: 40px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .summary-slide h2 {
    font-family: 'Playfair Display', serif;
    color: #C8922A;
    font-size: 28px;
    margin-bottom: 4px;
  }
  .summary-slide p { color: #7A6450; font-size: 13px; margin-bottom: 24px; }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    flex: 1;
  }
  .summary-card {
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border: 1px solid rgba(255,255,255,0.06);
    position: relative;
    overflow: hidden;
  }
  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .summary-card-name {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--white);
  }
  .summary-card-origin { font-size: 11px; color: #C8A870; }
  .summary-card-type {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .summary-card-flavor { font-size: 11px; color: #A09080; }
  .summary-card-pairs { font-size: 10px; color: #7A6450; margin-top: 4px; }

  /* SVG CHEESE SHAPES */
  .cheese-svg { width: 130px; height: 130px; }
</style>
</head>
<body>

<div class="slideshow" id="slideshow"></div>

<nav class="nav" id="nav">
  <button class="nav-btn" id="prevBtn" onclick="changeSlide(-1)">&#8592;</button>
  <div class="nav-dots" id="dots"></div>
  <span class="nav-info" id="navInfo">Cover</span>
  <button class="nav-btn" id="nextBtn" onclick="changeSlide(1)">&#8594;</button>
</nav>

// ─── SVG cheese shapes ───────────────────────────────────────
function cheeseSVG(shape, color, accent) {
  if (shape === 'wheel') return `
    <svg viewBox="0 0 130 130" class="cheese-svg">
      <circle cx="65" cy="65" r="58" fill="${color}" stroke="${accent}" stroke-width="4"/>
      <circle cx="65" cy="65" r="48" fill="none" stroke="${accent}40" stroke-width="1.5"/>
      <line x1="65" y1="65" x2="95" y2="22" stroke="${accent}50" stroke-width="1.5"/>
      <line x1="65" y1="65" x2="20" y2="50" stroke="${accent}50" stroke-width="1.5"/>
      <line x1="65" y1="65" x2="112" y2="78" stroke="${accent}50" stroke-width="1.5"/>
    </svg>`;
  if (shape === 'block') return `
    <svg viewBox="0 0 140 120" class="cheese-svg">
      <polygon points="10,90 10,30 100,30 100,90" fill="${color}" stroke="${accent}" stroke-width="3"/>
      <polygon points="10,30 35,8 125,8 100,30" fill="${color}CC" stroke="${accent}" stroke-width="3"/>
      <polygon points="100,90 125,68 125,8 100,30" fill="${color}88" stroke="${accent}" stroke-width="3"/>
    </svg>`;
  if (shape === 'wedge') return `
    <svg viewBox="0 0 140 130" class="cheese-svg">
      <polygon points="70,10 10,110 130,110" fill="${color}" stroke="${accent}" stroke-width="3.5"/>
      <line x1="10" y1="110" x2="130" y2="110" stroke="${accent}" stroke-width="3"/>
      <polygon points="70,10 130,110 125,108" fill="${color}AA" stroke="none"/>
    </svg>`;
  if (shape === 'ball') return `
    <svg viewBox="0 0 130 130" class="cheese-svg">
      <circle cx="65" cy="68" r="52" fill="${color}" stroke="${accent}" stroke-width="3"/>
      <ellipse cx="52" cy="50" rx="14" ry="18" fill="white" opacity="0.35"/>
    </svg>`;
  if (shape === 'wheel_holes') return `
    <svg viewBox="0 0 130 130" class="cheese-svg">
      <circle cx="65" cy="65" r="58" fill="${color}" stroke="${accent}" stroke-width="4"/>
      <ellipse cx="42" cy="60" rx="12" ry="10" fill="${accent}80" stroke="${accent}" stroke-width="1.5"/>
      <ellipse cx="80" cy="48" rx="9" ry="8" fill="${accent}80" stroke="${accent}" stroke-width="1.5"/>
      <ellipse cx="72" cy="78" rx="10" ry="8" fill="${accent}80" stroke="${accent}" stroke-width="1.5"/>
      <ellipse cx="48" cy="85" rx="7" ry="6" fill="${accent}80" stroke="${accent}" stroke-width="1.5"/>
      <ellipse cx="92" cy="70" rx="8" ry="7" fill="${accent}80" stroke="${accent}" stroke-width="1.5"/>
    </svg>`;
  return '';
}

// ─── Navigation ───────────────────────────────────────────────
const slides = document.querySelectorAll('.slide');
const totalSlides = slides.length;
let current = 0;

const dotsEl = document.getElementById('dots');
const navInfo = document.getElementById('navInfo');

// Build dots
slides.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'nav-dot' + (i===0?' active':'');
  dot.onclick = () => goToSlide(i);
  dotsEl.appendChild(dot);
});

function goToSlide(n) {
  slides[current].classList.remove('active');
  document.querySelectorAll('.nav-dot')[current].classList.remove('active');
  current = Math.max(0, Math.min(n, totalSlides-1));
  slides[current].classList.add('active');
  document.querySelectorAll('.nav-dot')[current].classList.add('active');
  // Scroll right panel to top
  const rp = slides[current].querySelector('.right-panel');
  if (rp) rp.scrollTop = 0;
  const sp = slides[current];
  if (sp.classList.contains('summary-slide')) sp.scrollTop = 0;
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === totalSlides-1;
  if (current === 0) navInfo.textContent = 'Cover';
  else if (current === totalSlides-1) navInfo.textContent = 'Summary';
  else navInfo.textContent = `${current} of ${totalSlides-2}`;
}

function changeSlide(dir) { goToSlide(current + dir); }

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changeSlide(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changeSlide(-1);
});

// Init
document.getElementById('prevBtn').disabled = true;
goToSlide(0);
